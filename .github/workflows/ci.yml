name: CI

# 单测 / 静态检查；快速反馈（< 5min）。
# PR + main push 触发；不依赖 Docker。
# 集成测试见 integration.yml（schedule + tag + workflow_dispatch）。

on:
  pull_request:
  push:
    branches: [main]

# 同一 PR 新 push 时取消旧 run，节省排队时间。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # 钉到 patch 版本：'1.25' 拉到 1.25.9 时被 GO-2026-4971 / 4918 扫到（govulncheck）；
  # 1.25.10 已修。后续 1.26 stable 时再大版本升。
  GO_VERSION: '1.25.10'
  # 与 Makefile / 模块版本对齐。
  PROTOC_GEN_GO_VERSION: 'v1.36.11'
  PROTOC_GEN_CONNECT_GO_VERSION: 'v1.19.2'
  GOLANGCI_LINT_VERSION: 'v2.11.4'

jobs:
  lint:
    name: Lint (Go + Buf)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install protoc plugins (cached via Go modcache)
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@${PROTOC_GEN_GO_VERSION}
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@${PROTOC_GEN_CONNECT_GO_VERSION}

      - name: Setup buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: gofmt drift
        run: |
          out=$(gofmt -l . | grep -v '^gen/' || true)
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go vet -tags=integration
        run: go vet -tags=integration ./...

      - name: go mod tidy drift
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::go.mod / go.sum 未 tidy；运行 'go mod tidy' 后再提交"
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

      - name: buf lint
        run: buf lint

      - name: buf format check
        run: |
          DIFF=$(buf format -d)
          if [ -n "$DIFF" ]; then
            echo "::error::buf format 未应用；运行 'buf format -w' 后再提交"
            echo "$DIFF"
            exit 1
          fi

      - name: buf generate drift（gen/ + web/src/gen/ 必须与 .proto 同步）
        run: |
          buf generate
          if ! git diff --exit-code -- gen/ web/src/gen/; then
            echo "::error::生成代码与 .proto 不同步；运行 'buf generate' 后再提交"
            exit 1
          fi

      - name: buf breaking（vs origin/main）
        # PR 改动 .proto 必须明确 break 类型；wire 兼容性才不被悄悄破坏。
        # 主分支自身 push 不跑（base 即自己）。
        if: github.event_name == 'pull_request'
        run: |
          # fetch main 给 buf 当 base
          git fetch origin main:refs/remotes/origin/main --depth=1 || true
          buf breaking --against '.git#branch=origin/main'

  test:
    name: Unit tests (-race)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -20

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage.out
          retention-days: 14

  build:
    name: Build binaries
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build redmatrix-server
        run: go build -trimpath -o /tmp/bin/redmatrix-server ./cmd/server

      - name: Build redmatrix-node
        run: go build -trimpath -o /tmp/bin/redmatrix-node ./cmd/node

      - name: Smoke (--help / version)
        run: |
          # scaffold 阶段 main 直接成功 exit 0 + 打印版本（缺 env 才 exit 2）。
          # 这里只验证 build 出来的二进制能 invoke：
          /tmp/bin/redmatrix-node || true
          /tmp/bin/redmatrix-server 2>&1 || true

  security:
    name: govulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # PR-S19-C：govulncheck 阻塞 HIGH/CRITICAL（去 continue-on-error）。
    # Go stdlib 漏洞动态出现确实会偶发红灯——这是 feature 不是 bug：
    # 红灯就该升 GO_VERSION，否则就是带漏洞跑生产。
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  docker-build:
    name: Docker build (server + node smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # 验证 production Dockerfile 在 main commit 状态可 build；
      # 不 push registry，仅 smoke 镜像可生成 + 二进制可启动报熟悉错。
      - name: Build redmatrix-server image
        run: |
          docker build -t redmatrix-server:ci -f cmd/server/Dockerfile .

      - name: Smoke redmatrix-server（缺 env 应明确 fail）
        run: |
          # 缺 PG_DSN → BOOTSTRAP_CONFIG_INVALID 退 exit 2；任何其它 exit 视为 build 退化
          set +e
          docker run --rm redmatrix-server:ci 2>&1 | tee /tmp/server.out
          rc=$?
          set -e
          # exit code 2 = bootstrap fatal（缺 env 预期）；scaffold 早期可能 0
          if [ "$rc" != "2" ] && [ "$rc" != "0" ]; then
            echo "::error::server boot 返非预期 exit=$rc"
            exit 1
          fi
          grep -q "BOOTSTRAP_CONFIG_INVALID\|PG_DSN" /tmp/server.out || {
            echo "::error::server stderr 缺预期 BOOTSTRAP 错"
            cat /tmp/server.out
            exit 1
          }

      - name: Build redmatrix-node image
        # node 镜像含 nmap/subfinder/httpx 三个工具下载 → 比 server 慢；
        # 这里只验 build 不验运行（运行需 mTLS cert + 注册 token）
        run: |
          docker build -t redmatrix-node:ci -f cmd/node/Dockerfile .

      - name: Smoke node binaries 安装齐
        run: |
          docker run --rm --entrypoint /bin/sh redmatrix-node:ci -c \
            "which nmap subfinder httpx && nmap --version | head -1"

  web-build:
    name: Web build (vite)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: vitest run
        run: pnpm test

      - name: vite build
        run: pnpm exec vite build

      - name: vue-tsc 严格类型检查（已知遗留 NodeDetail/NodesPanel 错暂允）
        run: |
          # 当前 NodeDetail.vue / NodesPanel.vue 因 connect-es 类型推断有
          # NodeCertificate/RegistrationToken 不匹配；待清。允许失败不阻塞。
          pnpm exec vue-tsc --noEmit 2>&1 | tee /tmp/vue-tsc.log || true
          # 但是 ScanResults / ScanDetail / AssetsPanel / AssetDetail 必须干净
          if grep -E "(ScanResults|ScanDetail|AssetsPanel|AssetDetail)\.vue.*error" /tmp/vue-tsc.log; then
            echo "::error::PR-S6+ 后新页面有类型错"
            exit 1
          fi
