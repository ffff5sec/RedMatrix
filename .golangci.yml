version: "2"
run:
  go: "1.25"
  tests: true
linters:
  default: none
  enable:
    - errcheck
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unused
    - whitespace
  settings:
    gocritic:
      disabled-checks:
        - paramTypeCombine
        - unnamedResult
        - hugeParam # Config / runOptions 按值传递是约定（调用后可继续使用），不切到指针
      enabled-tags:
        - diagnostic
        - performance
        - style
    gosec:
      excludes:
        - G104 # 与 errcheck 重叠
        - G101 # AUTH_TOKEN_* 等错误码字符串误判为凭据
    misspell:
      locale: US
    staticcheck:
      # QF1008（"could remove embedded field"）是风格建议；
      # 我们的 c.Client.Foo() 显式形式更利于跨 IDE 跳转。
      checks: ["all", "-QF1008"]
    revive:
      rules:
        - name: var-naming
        - name: error-return
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
          disabled: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gocritic
          - gosec
          - prealloc
        path: _test\.go
      - linters:
          - gosec
        path: cmd/.*main\.go
    paths:
      - gen
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/ffff5sec/RedMatrix
  exclusions:
    generated: lax
    paths:
      - gen
      - third_party$
      - builtin$
      - examples$
