syntax = "proto3";

// ScanService（PR-S1 入口）—— 扫描任务 CRUD。
//
// MVP 范围：仅任务管理；不含 dispatch / Agent 拉任务 / 结果上报。
// 路径：/redmatrix.scan.v1.ScanService
package redmatrix.scan.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

service ScanService {
  rpc CreateScanTask(CreateScanTaskRequest) returns (CreateScanTaskResponse);
  rpc ListScanTasks(ListScanTasksRequest) returns (ListScanTasksResponse);
  rpc GetScanTask(GetScanTaskRequest) returns (GetScanTaskResponse);
  rpc CancelScanTask(CancelScanTaskRequest) returns (CancelScanTaskResponse);
  rpc DeleteScanTask(DeleteScanTaskRequest) returns (DeleteScanTaskResponse);

  // ListTaskAssignments 详情页：列任务全部派发单（PR-S2）。
  rpc ListTaskAssignments(ListTaskAssignmentsRequest) returns (ListTaskAssignmentsResponse);

  // ListTaskResults 详情页：列任务全部扫描结果（PR-S5）。
  rpc ListTaskResults(ListTaskResultsRequest) returns (ListTaskResultsResponse);

  // SearchResults 全局结果搜索（PR-S7）—— 走 ES。
  // SA 跨租户；TA 限本租户；PA 限自己加入的项目（service 层注 project_id 过滤）。
  rpc SearchResults(SearchResultsRequest) returns (SearchResultsResponse);

  // RetryScanTask（PR-S14）—— 把 failed/canceled task 复制成 immediate
  // 实例触发 dispatch；返新实例 task。pending/running 拒。
  rpc RetryScanTask(RetryScanTaskRequest) returns (RetryScanTaskResponse);

  // GetArtifactDownloadURL（PR-S16）—— 前端拿大文件 result 的下载链接。
  // server 签预签名 GET URL（TTL 10min）；前端浏览器跳转该 URL 直接拉 MinIO。
  // RBAC: SA / TA / PA 同 ListResultsByTask。
  rpc GetArtifactDownloadURL(GetArtifactDownloadURLRequest) returns (GetArtifactDownloadURLResponse);
}

// ScanTask 任务实体（与 schema 一一对应）。
message ScanTask {
  string id = 1;
  string tenant_id = 2;
  string project_id = 3;
  string name = 4;
  string kind = 5; // port_scan / web_crawl / subdomain / fingerprint
  string target = 6;
  string target_kind = 7; // host / ip / cidr / url
  string status = 8; // pending / running / completed / failed / canceled
  string schedule_kind = 9; // immediate / cron
  string cron_expr = 10;
  google.protobuf.Struct settings = 11;
  string created_by = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
  optional google.protobuf.Timestamp started_at = 15;
  optional google.protobuf.Timestamp finished_at = 16;
  // source_task_id（PR-S15）：cron 模板触发的实例 / Retry 实例指回原 task。
  // 用户手动创建为空。
  string source_task_id = 17;
}

message CreateScanTaskRequest {
  string project_id = 1;
  string name = 2;
  string kind = 3;
  string target = 4;
  string target_kind = 5;
  // 可选：默认 immediate
  string schedule_kind = 6;
  string cron_expr = 7;
  google.protobuf.Struct settings = 8;
}
message CreateScanTaskResponse {
  ScanTask task = 1;
}

message ListScanTasksRequest {
  string project_id = 1;
  optional string status = 2;
  optional string keyword = 3;
  int32 page = 4;
  int32 page_size = 5;
}
message ListScanTasksResponse {
  repeated ScanTask tasks = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message GetScanTaskRequest {
  string id = 1;
}
message GetScanTaskResponse {
  ScanTask task = 1;
}

message CancelScanTaskRequest {
  string id = 1;
}
message CancelScanTaskResponse {}

message DeleteScanTaskRequest {
  string id = 1;
}
message DeleteScanTaskResponse {}

message RetryScanTaskRequest {
  string id = 1; // 原 failed/canceled task id
}
message RetryScanTaskResponse {
  ScanTask task = 1; // 新 immediate 实例 task
}

// PR-S16
message GetArtifactDownloadURLRequest {
  // artifact key（scan_results.data.artifact_key 字段值）
  string key = 1;
}
message GetArtifactDownloadURLResponse {
  string url = 1; // presigned GET URL（含 query 签名）
  google.protobuf.Timestamp expires_at = 2;
}

// ===== TaskAssignment（PR-S2）=====

message TaskAssignment {
  string id = 1;
  string task_id = 2;
  string node_id = 3;
  string status = 4; // assigned / pulled / running / completed / failed
  google.protobuf.Timestamp assigned_at = 5;
  optional google.protobuf.Timestamp pulled_at = 6;
  optional google.protobuf.Timestamp started_at = 7;
  optional google.protobuf.Timestamp finished_at = 8;
  string error = 9;
}

message ListTaskAssignmentsRequest {
  string task_id = 1;
}
message ListTaskAssignmentsResponse {
  repeated TaskAssignment assignments = 1;
  // 派发计数（与 ScanTask.task_count 对齐；MVP 等同 len(assignments)）。
  int32 total = 2;
}

// ===== ScanResult（PR-S5）=====

message ScanResult {
  string id = 1;
  string task_id = 2;
  string assignment_id = 3;
  string node_id = 4;
  string kind = 5;
  google.protobuf.Struct data = 6;
  google.protobuf.Timestamp created_at = 7;
  string tenant_id = 8; // PR-S7
  string project_id = 9; // PR-S7
}

message ListTaskResultsRequest {
  string task_id = 1;
}
message ListTaskResultsResponse {
  repeated ScanResult results = 1;
  int32 total = 2;
}

// ===== Search（PR-S7）=====
//
// SearchResults 是一次 ES 检索：filter（kind / project_id / node_id / time 范围）+
// 关键字（命中 data.* 全字段）+ facets（kind / node_id terms agg）。
// 分页用 page + page_size；MVP 限 page_size <= 100，page * page_size <= 10000。

message SearchResultsRequest {
  // 可选关键字：命中 data.* 全字段（host / banner / url / title / name 等）
  optional string keyword = 1;
  // 可选过滤
  optional string kind = 2; // 单个 kind；空表示不过滤
  optional string project_id = 3; // 单个 project；空表示不过滤
  optional string node_id = 4; // 单个 node；空表示不过滤
  optional string task_id = 5; // 单个 task；空表示不过滤
  optional google.protobuf.Timestamp time_from = 6;
  optional google.protobuf.Timestamp time_to = 7;
  int32 page = 8;
  int32 page_size = 9;
}

message FacetBucket {
  string key = 1;
  int32 count = 2;
}
message Facet {
  string field = 1; // "kind" / "node_id"
  repeated FacetBucket buckets = 2;
}

message SearchResultsResponse {
  repeated ScanResult results = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
  repeated Facet facets = 5;
}
