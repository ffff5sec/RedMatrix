syntax = "proto3";

// TenancyService（LLD 02 §4 / 11）—— PR-T2 scope：Project CRUD（不含
// 成员 / 节点 / 白名单 / 注册流程）。
package redmatrix.tenancy.v1;

import "google/protobuf/timestamp.proto";

// TenancyService 租户与项目核心 RPC（PR-T2 仅 Project）。
service TenancyService {
  // CreateProject 创建项目（SA only）。name 在租户内唯一。
  rpc CreateProject(CreateProjectRequest) returns (CreateProjectResponse);

  // ListProjects 列项目（SA / TA 全部；PA 限自己加入的——PA 过滤待 PR-T3
  // ProjectMember 落地后实现）。
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);

  // GetProject 取单个项目详情。
  rpc GetProject(GetProjectRequest) returns (GetProjectResponse);

  // ArchiveProject 归档（幂等）。归档项目不可变（仅 unarchive / delete / read）。
  rpc ArchiveProject(ArchiveProjectRequest) returns (ArchiveProjectResponse);

  // UnarchiveProject 取消归档（幂等）。
  rpc UnarchiveProject(UnarchiveProjectRequest) returns (UnarchiveProjectResponse);

  // DeleteProject 软删（MVP 不级联资产 / 任务，由 LLD 11 §4.4 后续 PR 接）。
  rpc DeleteProject(DeleteProjectRequest) returns (DeleteProjectResponse);

  // ===== ProjectMember =====

  // AddProjectMember 加成员（SA only）。被加用户必须 PROJECT_ADMIN 且 tenant 与项目一致。
  rpc AddProjectMember(AddProjectMemberRequest) returns (AddProjectMemberResponse);

  // RemoveProjectMember 移除成员（SA only）。
  rpc RemoveProjectMember(RemoveProjectMemberRequest) returns (RemoveProjectMemberResponse);

  // ListProjectMembers 列项目成员。SA + 该项目的 PA 可读。
  rpc ListProjectMembers(ListProjectMembersRequest) returns (ListProjectMembersResponse);

  // ===== Node =====
  //
  // PR-T4 仅 Node 手动 CRUD。RegistrationToken / mTLS / Heartbeat 待 PR-T4-B/D。

  // CreateNode 手动注册节点（SA only）。
  rpc CreateNode(CreateNodeRequest) returns (CreateNodeResponse);

  // ListNodes 列租户内节点。SA + TA 可读。
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse);

  // GetNode 取单个节点。SA + TA 可读。
  rpc GetNode(GetNodeRequest) returns (GetNodeResponse);

  // EnableNode 状态置 pending（SA only）。
  rpc EnableNode(EnableNodeRequest) returns (EnableNodeResponse);

  // DisableNode 状态置 disabled（SA only）。
  rpc DisableNode(DisableNodeRequest) returns (DisableNodeResponse);

  // DeleteNode 软删（SA only）。
  rpc DeleteNode(DeleteNodeRequest) returns (DeleteNodeResponse);

  // ===== Project Allowed Nodes =====

  // SetProjectAllowedNodes 全量替换项目白名单（SA / 该项目 PA）。
  // 空 node_ids = 恢复 ALL 默认（所有节点可用）。
  rpc SetProjectAllowedNodes(SetProjectAllowedNodesRequest) returns (SetProjectAllowedNodesResponse);

  // GetProjectAllowedNodes 取项目白名单。
  // 返 all_nodes=true 表示 ALL 默认；false 时 node_ids 是显式列表。
  rpc GetProjectAllowedNodes(GetProjectAllowedNodesRequest) returns (GetProjectAllowedNodesResponse);

  // ===== RegistrationToken（节点接入）=====

  // CreateRegistrationToken 生成一次性节点注册令牌（SA only）。
  // 返 plaintext 仅一次性显示。
  rpc CreateRegistrationToken(CreateRegistrationTokenRequest) returns (CreateRegistrationTokenResponse);

  // ListRegistrationTokens 列租户全部令牌（SA + TA）。
  rpc ListRegistrationTokens(ListRegistrationTokensRequest) returns (ListRegistrationTokensResponse);

  // RevokeRegistrationToken 撤销令牌（SA only）。
  rpc RevokeRegistrationToken(RevokeRegistrationTokenRequest) returns (RevokeRegistrationTokenResponse);

  // RedeemRegistrationToken 真节点首次接入（公开 RPC；plaintext 自身即认证）。
  // 兑换 → 创建 Node 行（status=pending）+ 单次性消费 token。
  rpc RedeemRegistrationToken(RedeemRegistrationTokenRequest) returns (RedeemRegistrationTokenResponse);

  // ListNodeCertificates 列某节点全部 cert（含已撤 / 已过期），SA / Auditor only。
  // 用于节点详情页展示续期历史 / 指纹审计（PR-W6）。
  rpc ListNodeCertificates(ListNodeCertificatesRequest) returns (ListNodeCertificatesResponse);

  // RevokeNodeCertificate 撤销节点 cert（SA only；PR-T4-D6）。
  // 撤销后 mTLS 中间件下次反查 fingerprint 时 IsValid() = false → 拒。
  rpc RevokeNodeCertificate(RevokeNodeCertificateRequest) returns (RevokeNodeCertificateResponse);

  // GetStats 概览页 KPI 一次拉齐（PR-W7；SA / Auditor only）。
  // 替代 dashboard 的 list * 3 客户端聚合。
  rpc GetStats(GetStatsRequest) returns (GetStatsResponse);
}

// ===== Project =====

message Project {
  string id = 1;
  string tenant_id = 2;
  string name = 3;
  string description = 4;
  string status = 5; // active / archived
  string created_by = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  optional google.protobuf.Timestamp archived_at = 9;
  // settings + stats_cache 在 MVP 不暴露字段细节，前端按 status 渲染即可
}

// ===== CRUD =====

message CreateProjectRequest {
  // tenant_id 留空 = 用 caller principal.tenant_id；SA 跨租户时显式指定。
  string tenant_id = 1;
  string name = 2;
  string description = 3;
}
message CreateProjectResponse {
  Project project = 1;
}

message ListProjectsRequest {
  optional string tenant_id = 1;
  optional string status = 2; // active / archived
  optional string keyword = 3;
  int32 page = 4;
  int32 page_size = 5;
}
message ListProjectsResponse {
  repeated Project projects = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message GetProjectRequest {
  string id = 1;
}
message GetProjectResponse {
  Project project = 1;
}

message ArchiveProjectRequest {
  string id = 1;
}
message ArchiveProjectResponse {}

message UnarchiveProjectRequest {
  string id = 1;
}
message UnarchiveProjectResponse {}

message DeleteProjectRequest {
  string id = 1;
}
message DeleteProjectResponse {}

// ===== ProjectMember =====

message ProjectMember {
  string project_id = 1;
  string user_id = 2;
  string tenant_id = 3;
  string added_by = 4;
  google.protobuf.Timestamp added_at = 5;
}

message AddProjectMemberRequest {
  string project_id = 1;
  string user_id = 2;
}
message AddProjectMemberResponse {}

message RemoveProjectMemberRequest {
  string project_id = 1;
  string user_id = 2;
}
message RemoveProjectMemberResponse {}

message ListProjectMembersRequest {
  string project_id = 1;
}
message ListProjectMembersResponse {
  repeated ProjectMember members = 1;
}

// ===== Node =====

message Node {
  string id = 1;
  string tenant_id = 2;
  string name = 3;
  string version = 4;
  repeated string capabilities = 5;
  string status = 6; // pending / online / offline / disabled
  optional google.protobuf.Timestamp last_seen_at = 7;
  string created_by = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message CreateNodeRequest {
  string tenant_id = 1; // 留空 = 用 caller principal.tenant_id
  string name = 2;
  string version = 3;
  repeated string capabilities = 4;
}
message CreateNodeResponse {
  Node node = 1;
}

message ListNodesRequest {
  optional string tenant_id = 1;
  optional string status = 2;
  optional string keyword = 3;
  int32 page = 4;
  int32 page_size = 5;
}
message ListNodesResponse {
  repeated Node nodes = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message GetNodeRequest {
  string id = 1;
}
message GetNodeResponse {
  Node node = 1;
}

message EnableNodeRequest {
  string id = 1;
}
message EnableNodeResponse {}

message DisableNodeRequest {
  string id = 1;
}
message DisableNodeResponse {}

message DeleteNodeRequest {
  string id = 1;
}
message DeleteNodeResponse {}

// ===== Project Allowed Nodes =====

message SetProjectAllowedNodesRequest {
  string project_id = 1;
  // 空 = 恢复 ALL 默认（所有节点可用）
  repeated string node_ids = 2;
}
message SetProjectAllowedNodesResponse {}

message GetProjectAllowedNodesRequest {
  string project_id = 1;
}
message GetProjectAllowedNodesResponse {
  // all_nodes=true → 所有节点可用（白名单为空）；false → node_ids 是显式列表
  bool all_nodes = 1;
  repeated string node_ids = 2;
}

// ===== RegistrationToken =====

message RegistrationToken {
  string id = 1;
  string tenant_id = 2;
  string name = 3;
  // token_hash 入参出参不携带 plaintext；仅 Create 一次性返
  google.protobuf.Timestamp expires_at = 4;
  optional google.protobuf.Timestamp used_at = 5;
  optional google.protobuf.Timestamp revoked_at = 6;
  string created_by = 7;
  google.protobuf.Timestamp created_at = 8;
}

message CreateRegistrationTokenRequest {
  string tenant_id = 1;
  string name = 2;
  // ttl_seconds 0 = 默认 1h；范围 [60, 86400]
  int64 ttl_seconds = 3;
}
message CreateRegistrationTokenResponse {
  RegistrationToken token = 1;
  // plaintext 一次性返回；丢失需 Revoke + 重建
  string plaintext = 2;
}

message ListRegistrationTokensRequest {
  string tenant_id = 1;
}
message ListRegistrationTokensResponse {
  repeated RegistrationToken tokens = 1;
}

message RevokeRegistrationTokenRequest {
  string id = 1;
}
message RevokeRegistrationTokenResponse {}

message RedeemRegistrationTokenRequest {
  string plaintext = 1;
  string node_name = 2;
  string version = 3;
}
message RedeemRegistrationTokenResponse {
  Node node = 1;
  // 节点首次签发的 client cert（mTLS 用；server 不留 key）。
  string node_cert_pem = 2;
  string node_key_pem = 3;
  // server 持的 root CA（Agent 校验 server cert 用）。
  string ca_cert_pem = 4;
  // SHA-256(DER) hex；server 后续 mTLS 反查节点 ID。
  string fingerprint = 5;
  // RFC3339；Agent 提前续期参考。
  string cert_expires_at = 6;
}

// NodeAgentService 是 mTLS-only 的节点上报通道（PR-T4-D3）。
//
// 与 TenancyService 同包但端点分离：
//   - TenancyService → 浏览器 / SA 走 cookie/JWT
//   - NodeAgentService → Agent 走 client cert（peer cert SHA-256 反查 node_id）
//
// 业务上不复用 TenancyService 是为了让"哪些 RPC 走 mTLS"由 mount 路径决定，
// 而不是每个方法注解；同时方便 Agent 端只生成本服务的 client。
service NodeAgentService {
  // Heartbeat 周期上报（默认 30s/次；服务端写 last_seen_at + pending/offline → online）。
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // ReissueCert 续期（PR-T4-D5）：用现有 mTLS cert 换一份新 cert。
  //
  // Agent 在 cert 临过期（默认 cert 寿命剩 7 天）时主动调；
  // server 不 revoke 旧 cert——agent 切到新 cert 后旧 cert 自然过期。
  rpc ReissueCert(ReissueCertRequest) returns (ReissueCertResponse);

  // PullTasks 拉取派给本节点的任务（PR-S3）。
  // 服务端把所有 status='assigned' 的 assignment 原子更新为 'pulled' 并返回，
  // node_id 由 mTLS 中间件按 cert 指纹注 ctx，agent 不可伪造。
  rpc PullTasks(PullTasksRequest) returns (PullTasksResponse);

  // ReportTaskProgress 上报任务进度（running / completed / failed）。
  // 服务端校 assignment.node_id == ctx node_id（同 mTLS 调用方）+ 状态机合法。
  rpc ReportTaskProgress(ReportTaskProgressRequest) returns (ReportTaskProgressResponse);
}

message HeartbeatRequest {
  // 注意：node_id 不在请求里。中间件按 mTLS peer cert SHA-256 反查 → 注入
  // ctx；Agent 即使伪造 node_id 也无效。
  string version = 1; // Agent 自报版本（可选）
}
message HeartbeatResponse {
  // 服务端"现在"时刻 RFC3339；Agent 用来纠时钟漂移。
  string server_time = 1;
  // 下次心跳期望延迟秒数（30s）。Agent 应叠 ±10% jitter 防雪崩。
  int32 interval_seconds = 2;
}

message ReissueCertRequest {
  // 与 Heartbeat 一样：node_id 不在请求里，由 mTLS 中间件按 cert 指纹注 ctx。
}
message ReissueCertResponse {
  // 新 client cert（覆盖旧 cert/key/ca）；server 不返 node_id（节点身份不变）。
  string node_cert_pem = 1;
  string node_key_pem = 2;
  string ca_cert_pem = 3;
  // SHA-256(DER) hex；mTLS 反查节点 ID 时用。
  string fingerprint = 4;
  // RFC3339；下次续期参考。
  string cert_expires_at = 5;
}

// === PR-S3 任务拉取 / 进度上报 ===

// AssignedTask 是 Agent 拉到的任务承载（task 字段 + assignment id）。
// 不重复 ScanTask 全字段，仅暴露 Agent 执行所需。
message AssignedTask {
  string assignment_id = 1;
  string task_id = 2;
  string project_id = 3;
  string kind = 4; // port_scan / web_crawl / subdomain / fingerprint
  string target = 5;
  string target_kind = 6; // host / ip / cidr / url
}

message PullTasksRequest {}
message PullTasksResponse {
  repeated AssignedTask tasks = 1;
}

message ReportTaskProgressRequest {
  string assignment_id = 1;
  // 允许值: running / completed / failed
  string status = 2;
  // 仅 status=failed 时填。
  string error = 3;
}
message ReportTaskProgressResponse {}

// ===== NodeCertificate（PR-W6 节点详情页）=====

// NodeCertificate 为审计 / 详情页展示而暴露的 cert 元数据；不含 PEM / private key。
message NodeCertificate {
  string id = 1;
  string node_id = 2;
  string serial_number = 3;
  string fingerprint = 4; // SHA-256(DER) hex 64 char
  string common_name = 5;
  google.protobuf.Timestamp issued_at = 6;
  google.protobuf.Timestamp expires_at = 7;
  optional google.protobuf.Timestamp revoked_at = 8;
  // 关联的 RegistrationToken UUID（reissue 时为空）；空 = 续期签发或非令牌路径。
  string issued_by_token = 9;
  google.protobuf.Timestamp created_at = 10;
}

message ListNodeCertificatesRequest {
  string node_id = 1;
}
message ListNodeCertificatesResponse {
  repeated NodeCertificate certificates = 1;
}

message RevokeNodeCertificateRequest {
  string id = 1;
}
message RevokeNodeCertificateResponse {}

// ===== Stats（PR-W7 Dashboard）=====

message GetStatsRequest {
  // 空 = 默认 tenant；后续多租户开关后让 SA 跨租户。
  string tenant_id = 1;
}
message GetStatsResponse {
  int32 projects_active = 1;
  int32 projects_archived = 2;
  int32 nodes_total = 3;
  int32 nodes_online = 4;
  int32 nodes_pending = 5;
  int32 nodes_offline = 6;
  int32 nodes_disabled = 7;
  // 未撤、未用、未过期。
  int32 registration_tokens_active = 8;
}
