syntax = "proto3";

// TenancyService（LLD 02 §4 / 11）—— PR-T2 scope：Project CRUD（不含
// 成员 / 节点 / 白名单 / 注册流程）。
package redmatrix.tenancy.v1;

import "google/protobuf/timestamp.proto";

// TenancyService 租户与项目核心 RPC（PR-T2 仅 Project）。
service TenancyService {
  // CreateProject 创建项目（SA only）。name 在租户内唯一。
  rpc CreateProject(CreateProjectRequest) returns (CreateProjectResponse);

  // ListProjects 列项目（SA / TA 全部；PA 限自己加入的——PA 过滤待 PR-T3
  // ProjectMember 落地后实现）。
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);

  // GetProject 取单个项目详情。
  rpc GetProject(GetProjectRequest) returns (GetProjectResponse);

  // ArchiveProject 归档（幂等）。归档项目不可变（仅 unarchive / delete / read）。
  rpc ArchiveProject(ArchiveProjectRequest) returns (ArchiveProjectResponse);

  // UnarchiveProject 取消归档（幂等）。
  rpc UnarchiveProject(UnarchiveProjectRequest) returns (UnarchiveProjectResponse);

  // DeleteProject 软删（MVP 不级联资产 / 任务，由 LLD 11 §4.4 后续 PR 接）。
  rpc DeleteProject(DeleteProjectRequest) returns (DeleteProjectResponse);

  // ===== ProjectMember =====

  // AddProjectMember 加成员（SA only）。被加用户必须 PROJECT_ADMIN 且 tenant 与项目一致。
  rpc AddProjectMember(AddProjectMemberRequest) returns (AddProjectMemberResponse);

  // RemoveProjectMember 移除成员（SA only）。
  rpc RemoveProjectMember(RemoveProjectMemberRequest) returns (RemoveProjectMemberResponse);

  // ListProjectMembers 列项目成员。SA + 该项目的 PA 可读。
  rpc ListProjectMembers(ListProjectMembersRequest) returns (ListProjectMembersResponse);

  // ===== Node =====
  //
  // PR-T4 仅 Node 手动 CRUD。RegistrationToken / mTLS / Heartbeat 待 PR-T4-B/D。

  // CreateNode 手动注册节点（SA only）。
  rpc CreateNode(CreateNodeRequest) returns (CreateNodeResponse);

  // ListNodes 列租户内节点。SA + TA 可读。
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse);

  // GetNode 取单个节点。SA + TA 可读。
  rpc GetNode(GetNodeRequest) returns (GetNodeResponse);

  // EnableNode 状态置 pending（SA only）。
  rpc EnableNode(EnableNodeRequest) returns (EnableNodeResponse);

  // DisableNode 状态置 disabled（SA only）。
  rpc DisableNode(DisableNodeRequest) returns (DisableNodeResponse);

  // DeleteNode 软删（SA only）。
  rpc DeleteNode(DeleteNodeRequest) returns (DeleteNodeResponse);

  // ===== Project Allowed Nodes =====

  // SetProjectAllowedNodes 全量替换项目白名单（SA / 该项目 PA）。
  // 空 node_ids = 恢复 ALL 默认（所有节点可用）。
  rpc SetProjectAllowedNodes(SetProjectAllowedNodesRequest) returns (SetProjectAllowedNodesResponse);

  // GetProjectAllowedNodes 取项目白名单。
  // 返 all_nodes=true 表示 ALL 默认；false 时 node_ids 是显式列表。
  rpc GetProjectAllowedNodes(GetProjectAllowedNodesRequest) returns (GetProjectAllowedNodesResponse);

  // ===== RegistrationToken（节点接入）=====

  // CreateRegistrationToken 生成一次性节点注册令牌（SA only）。
  // 返 plaintext 仅一次性显示。
  rpc CreateRegistrationToken(CreateRegistrationTokenRequest) returns (CreateRegistrationTokenResponse);

  // ListRegistrationTokens 列租户全部令牌（SA + TA）。
  rpc ListRegistrationTokens(ListRegistrationTokensRequest) returns (ListRegistrationTokensResponse);

  // RevokeRegistrationToken 撤销令牌（SA only）。
  rpc RevokeRegistrationToken(RevokeRegistrationTokenRequest) returns (RevokeRegistrationTokenResponse);

  // RedeemRegistrationToken 真节点首次接入（公开 RPC；plaintext 自身即认证）。
  // 兑换 → 创建 Node 行（status=pending）+ 单次性消费 token。
  rpc RedeemRegistrationToken(RedeemRegistrationTokenRequest) returns (RedeemRegistrationTokenResponse);
}

// ===== Project =====

message Project {
  string id = 1;
  string tenant_id = 2;
  string name = 3;
  string description = 4;
  string status = 5; // active / archived
  string created_by = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  optional google.protobuf.Timestamp archived_at = 9;
  // settings + stats_cache 在 MVP 不暴露字段细节，前端按 status 渲染即可
}

// ===== CRUD =====

message CreateProjectRequest {
  // tenant_id 留空 = 用 caller principal.tenant_id；SA 跨租户时显式指定。
  string tenant_id = 1;
  string name = 2;
  string description = 3;
}
message CreateProjectResponse {
  Project project = 1;
}

message ListProjectsRequest {
  optional string tenant_id = 1;
  optional string status = 2; // active / archived
  optional string keyword = 3;
  int32 page = 4;
  int32 page_size = 5;
}
message ListProjectsResponse {
  repeated Project projects = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message GetProjectRequest {
  string id = 1;
}
message GetProjectResponse {
  Project project = 1;
}

message ArchiveProjectRequest {
  string id = 1;
}
message ArchiveProjectResponse {}

message UnarchiveProjectRequest {
  string id = 1;
}
message UnarchiveProjectResponse {}

message DeleteProjectRequest {
  string id = 1;
}
message DeleteProjectResponse {}

// ===== ProjectMember =====

message ProjectMember {
  string project_id = 1;
  string user_id = 2;
  string tenant_id = 3;
  string added_by = 4;
  google.protobuf.Timestamp added_at = 5;
}

message AddProjectMemberRequest {
  string project_id = 1;
  string user_id = 2;
}
message AddProjectMemberResponse {}

message RemoveProjectMemberRequest {
  string project_id = 1;
  string user_id = 2;
}
message RemoveProjectMemberResponse {}

message ListProjectMembersRequest {
  string project_id = 1;
}
message ListProjectMembersResponse {
  repeated ProjectMember members = 1;
}

// ===== Node =====

message Node {
  string id = 1;
  string tenant_id = 2;
  string name = 3;
  string version = 4;
  repeated string capabilities = 5;
  string status = 6; // pending / online / offline / disabled
  optional google.protobuf.Timestamp last_seen_at = 7;
  string created_by = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message CreateNodeRequest {
  string tenant_id = 1; // 留空 = 用 caller principal.tenant_id
  string name = 2;
  string version = 3;
  repeated string capabilities = 4;
}
message CreateNodeResponse {
  Node node = 1;
}

message ListNodesRequest {
  optional string tenant_id = 1;
  optional string status = 2;
  optional string keyword = 3;
  int32 page = 4;
  int32 page_size = 5;
}
message ListNodesResponse {
  repeated Node nodes = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message GetNodeRequest {
  string id = 1;
}
message GetNodeResponse {
  Node node = 1;
}

message EnableNodeRequest {
  string id = 1;
}
message EnableNodeResponse {}

message DisableNodeRequest {
  string id = 1;
}
message DisableNodeResponse {}

message DeleteNodeRequest {
  string id = 1;
}
message DeleteNodeResponse {}

// ===== Project Allowed Nodes =====

message SetProjectAllowedNodesRequest {
  string project_id = 1;
  // 空 = 恢复 ALL 默认（所有节点可用）
  repeated string node_ids = 2;
}
message SetProjectAllowedNodesResponse {}

message GetProjectAllowedNodesRequest {
  string project_id = 1;
}
message GetProjectAllowedNodesResponse {
  // all_nodes=true → 所有节点可用（白名单为空）；false → node_ids 是显式列表
  bool all_nodes = 1;
  repeated string node_ids = 2;
}

// ===== RegistrationToken =====

message RegistrationToken {
  string id = 1;
  string tenant_id = 2;
  string name = 3;
  // token_hash 入参出参不携带 plaintext；仅 Create 一次性返
  google.protobuf.Timestamp expires_at = 4;
  optional google.protobuf.Timestamp used_at = 5;
  optional google.protobuf.Timestamp revoked_at = 6;
  string created_by = 7;
  google.protobuf.Timestamp created_at = 8;
}

message CreateRegistrationTokenRequest {
  string tenant_id = 1;
  string name = 2;
  // ttl_seconds 0 = 默认 1h；范围 [60, 86400]
  int64 ttl_seconds = 3;
}
message CreateRegistrationTokenResponse {
  RegistrationToken token = 1;
  // plaintext 一次性返回；丢失需 Revoke + 重建
  string plaintext = 2;
}

message ListRegistrationTokensRequest {
  string tenant_id = 1;
}
message ListRegistrationTokensResponse {
  repeated RegistrationToken tokens = 1;
}

message RevokeRegistrationTokenRequest {
  string id = 1;
}
message RevokeRegistrationTokenResponse {}

message RedeemRegistrationTokenRequest {
  string plaintext = 1;
  string node_name = 2;
  string version = 3;
}
message RedeemRegistrationTokenResponse {
  Node node = 1;
}
