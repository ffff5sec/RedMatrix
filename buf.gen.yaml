version: v2

# buf v2 managed mode：统一覆盖 go_package（避免每个文件手写）
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/ffff5sec/RedMatrix/gen/proto

plugins:
  # Go message types
  - local: protoc-gen-go
    out: gen/proto
    opt:
      - paths=source_relative

  # ConnectRPC handler / client
  - local: protoc-gen-connect-go
    out: gen/proto
    opt:
      - paths=source_relative

  # === TypeScript（前端 demo）===
  # 通过 web/node_modules 里的 protoc-gen-es / protoc-gen-connect-es 生成。
  # 需先在 web/ 目录跑 pnpm install。
  - local: ./web/node_modules/.bin/protoc-gen-es
    out: web/src/gen/proto
    opt:
      - target=ts
  - local: ./web/node_modules/.bin/protoc-gen-connect-es
    out: web/src/gen/proto
    opt:
      - target=ts
