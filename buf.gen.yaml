version: v2

# buf v2 managed mode：统一覆盖 go_package（避免每个文件手写）
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/ffff5sec/RedMatrix/gen/proto

plugins:
  # Go message types
  - local: protoc-gen-go
    out: gen/proto
    opt:
      - paths=source_relative

  # ConnectRPC handler / client
  - local: protoc-gen-connect-go
    out: gen/proto
    opt:
      - paths=source_relative

  # === TypeScript（前端 demo）===
  # 用 buf 远程插件，无需本地 pnpm install 就能跑（CI / 新机首次拉取友好）。
  # 版本对齐 web/package.json 的 dependencies/@bufbuild/protobuf
  # + @connectrpc/connect-web。
  - remote: buf.build/bufbuild/es:v1.10.0
    out: web/src/gen/proto
    opt:
      - target=ts
  - remote: buf.build/connectrpc/es:v1.4.0
    out: web/src/gen/proto
    opt:
      - target=ts
