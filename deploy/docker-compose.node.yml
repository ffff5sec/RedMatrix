# RedMatrix Scan Node 单独部署（PR-S66）。
#
# 节点（agent）通常部署在与 server 不同的主机上，靠近被扫目标网段。
# 一台主机一份此 compose。多节点 = 多台主机各自起。
#
# 启动流程：
#   1. 在 server UI（SA）→ 节点管理 → 生成 RegistrationToken（rmnode_xxx，一次性）
#   2. cp deploy/.env.node.example deploy/.env.node ；填 token / 节点名 /
#      server 地址
#   3. docker compose -f deploy/docker-compose.node.yml --env-file deploy/.env.node build node
#   4. docker compose -f deploy/docker-compose.node.yml --env-file deploy/.env.node up -d
#   5. `docker compose logs -f node` 应看到 "node registered ok / mtls heartbeat ok"
#
# 首启后 token 即作废；mTLS leaf cert 持久在 node-data volume，重启不需重注册。
# 节点宕机后用 SA UI 直接停用 / 注销节点。
#
# 插件二进制：把 nmap / subfinder / httpx / nuclei / tlsx 等放主机
# /opt/redmatrix/plugins，挂进容器供 agent fork 调用。
# RedMatrix L1 插件（crtsh / fofa / hunter / quake）内置在 agent 二进制不需外置文件。

name: redmatrix-node

services:
  node:
    build:
      context: ..
      dockerfile: cmd/node/Dockerfile
      args:
        VERSION: ${NODE_VERSION:-prod}
    image: ${NODE_IMAGE:-redmatrix-node:${NODE_VERSION:-prod}}
    restart: always
    env_file:
      - .env.node
    environment:
      # === 与 cmd/node/main.go 一致的 env 键 ===
      # server 公开 HTTP 端点（用于 /api/v1/* + 拉插件包）
      REDMATRIX_SERVER_URL: ${REDMATRIX_SERVER_URL:?need REDMATRIX_SERVER_URL}
      # mTLS 控制面端点（agent 跑业务 RPC 走这里）
      REDMATRIX_NODE_AGENT_URL: ${REDMATRIX_NODE_AGENT_URL:?need REDMATRIX_NODE_AGENT_URL}
      # 一次性 RegistrationToken（从 server UI 取；接入后即作废）
      REDMATRIX_NODE_TOKEN: ${REDMATRIX_NODE_TOKEN:?need REDMATRIX_NODE_TOKEN}
      # 节点显示名；同 tenant 内唯一
      REDMATRIX_NODE_NAME: ${REDMATRIX_NODE_NAME:?need REDMATRIX_NODE_NAME}
      # 数据目录（client cert 持久）
      REDMATRIX_NODE_DATA_DIR: /data
      # mTLS server SAN override；当 server URL 用 IP 时通常不需要
      # REDMATRIX_MTLS_SERVER_NAME: ${REDMATRIX_MTLS_SERVER_NAME:-}
      # 外置插件目录（mount 进来后 agent 自动加入 PATH）
      REDMATRIX_PLUGIN_DIR: /opt/plugins
    volumes:
      - node-data:/data
      # 把主机 /opt/redmatrix/plugins 挂进来；放 nmap / subfinder / httpx / nuclei / tlsx 等二进制
      - ${PLUGIN_HOST_DIR:-/opt/redmatrix/plugins}:/opt/plugins:ro

volumes:
  node-data:
