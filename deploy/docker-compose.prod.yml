# RedMatrix 生产部署样例 docker-compose（PR-S19-B）。
#
# 本文件是**样板 / 起点**，不是 turn-key：生产需根据机器规模 / 容灾要求改：
#   - PG/ES/MinIO 单机 vs RDS/托管
#   - server 副本数 / 反向代理 / TLS 证书来源
#   - 备份 / 监控对接
#
# 启动流程（首次）：
#   1. 复制 .env.prod.example → .env.prod，填实际密钥（强烈建议从 secret manager 注入而非明文）
#   2. docker compose -f deploy/docker-compose.prod.yml --env-file .env.prod up -d
#   3. 看 server 日志：`docker compose logs -f server`
#      首启会跑 migration + bootstrap admin（用 ADMIN_BOOTSTRAP_PASSWORD）
#   4. 浏览器访问 https://<DOMAIN>/，用 admin 登录后立即改密
#
# 镜像 pin（生产必须）：
#   各镜像 tag 仅是别名，可能上游漂移。生产 SHA256 pin：
#     docker pull postgres:16-alpine && docker inspect ... --format='{{index .RepoDigests 0}}'
#     替换 image: postgres:16-alpine 为 image: postgres@sha256:<digest>
#
# 数据持久：
#   全部 volume 挂在本机（pg-data / redis-data / es-data / minio-data / server-data）。
#   生产建议 named volume → 备份脚本周期 pg_dump / es snapshot / minio mirror 到对象存储。

name: redmatrix-prod

services:
  pg:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:?need POSTGRES_ADMIN_PASSWORD}
      POSTGRES_DB: redmatrix
    volumes:
      - pg-data:/var/lib/postgresql/data
      # 首启执行 init-pg/*.sql：建 redmatrix_app / redmatrix_maintenance 角色
      # 生产应预先在 PG 端建好角色 + 设密码，把 init 目录留空
      - ../dev/init-pg:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    # 生产应起 password（--requirepass）+ AOF appendonly yes
    command: redis-server --requirepass ${REDIS_PASSWORD:?need REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  es:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    restart: always
    environment:
      - discovery.type=single-node
      # 生产强烈建议开启 security；这里 sample 仍然关闭以减少 sample 复杂度
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2024-08-17T01-24-54Z
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?need MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?need MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # 一次性建 9 bucket（与 internal/storage/minio.RequiredBuckets 严格一致）
  minio-bootstrap:
    image: minio/mc:RELEASE.2024-08-17T11-33-50Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        for b in redmatrix-plugins redmatrix-screenshots redmatrix-response-bodies redmatrix-reports redmatrix-audit-archive redmatrix-es-snapshots redmatrix-logs redmatrix-backups redmatrix-avatars; do
          mc mb -p "local/$$b" 2>/dev/null || true
        done
        echo "redmatrix buckets ready"

  server:
    image: ${SERVER_IMAGE:-redmatrix-server:dev}
    restart: always
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy
      es:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      # 容器内部 endpoint（指向同 compose 网络中服务）
      PG_DSN: "postgres://redmatrix_app:${REDMATRIX_APP_PASSWORD:?}@pg:5432/redmatrix?sslmode=disable"
      PG_MAINTENANCE_DSN: "postgres://redmatrix_maintenance:${REDMATRIX_MAINT_PASSWORD:?}@pg:5432/redmatrix?sslmode=disable"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      ES_URL: "http://es:9200"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ROOT_USER}"
      MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD}"
      MINIO_PUBLIC_ENDPOINT: "${MINIO_PUBLIC_ENDPOINT:?need MINIO_PUBLIC_ENDPOINT for presigned URL host}"
      PUBLIC_GRPC_ADDR: "0.0.0.0:9090"
      HTTP_BIND_ADDR: "0.0.0.0:8080"
    ports:
      # 生产应把 8080 隐藏在 Caddy/Nginx 反代之后；mTLS 9090 直接暴露给 agent
      - "8080:8080"
      - "9090:9090"
    volumes:
      - server-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6

  # （可选）反向代理 + 自动 TLS：取消注释 + 配置 DOMAIN
  # caddy:
  #   image: caddy:2-alpine
  #   restart: always
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy-data:/data
  #     - caddy-config:/config
  #   depends_on:
  #     server:
  #       condition: service_healthy

volumes:
  pg-data:
  redis-data:
  es-data:
  minio-data:
  server-data:
  # caddy-data:
  # caddy-config:
