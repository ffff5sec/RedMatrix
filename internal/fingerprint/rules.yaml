    fields: [body]
    keyword: safedog
  - name: 长亭雷池WAF
    fields: [body]
    keyword: SafeLine
  - name: Cloudflare-WAF
    fields: [body]
    keyword: '"Attention Required! | Cloudflare"'

  # === 路由器 / IoT / 厂商默认页 ===
