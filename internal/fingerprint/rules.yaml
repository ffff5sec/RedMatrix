    keyword: H3C
  - name: Huawei-Device
    fields: [title]
    keyword: Huawei
  - name: 海康威视
    fields: [title, body]
    keyword: hikvision
  - name: 大华
    fields: [title, body]
    keyword: dahua

  # === 默认页 / 错误页 ===
  - name: Nginx-Default-Page
    fields: [title]
    keyword: Welcome to nginx
  - name: Apache-Default-Page
    fields: [title]
    keyword: Apache2 Ubuntu Default Page
  - name: IIS-Default-Page
    fields: [title]
    keyword: IIS Windows
  - name: Tomcat-Default-Page
    fields: [title]
    keyword: Apache Tomcat
