# RedMatrix 内置指纹规则集（PR-S68）。
#
# 字段约定：
#   name           命中后写入 asset / scan_result 的 tech 标签
#   fields         限制查的字段；空 = 全 string 字段（含 []string）
#                  常见可选字段：title / body / webserver / favicon_hash / tech
#   keyword        子串匹配（默认大小写不敏感）
#   case_sensitive false 默认；true 时区分大小写
#
# 设计：
#   - 默认规则覆盖国内常见 stack + 通用 Web 服务器 / 中间件
#   - 不与 httpx 内置 wappalyzer-style detection 重复（不写 nginx / WordPress
#     这类 httpx 已识别；只补 httpx 不覆盖的）—— 实际上 httpx 不一定都识别准，
#     这里仍保留少量通用规则做强化
#   - 字段优先级：webserver / title 比 body 准；body 易误判

rules:
  # === 通用 Web 服务器（补强 httpx）===
  - name: nginx
    fields: [webserver, body, title]
    keyword: nginx
  - name: Apache
    fields: [webserver]
    keyword: Apache
  - name: IIS
    fields: [webserver]
    keyword: Microsoft-IIS
  - name: Tengine
    fields: [webserver]
    keyword: Tengine
  - name: LiteSpeed
    fields: [webserver]
    keyword: LiteSpeed
  - name: Caddy
    fields: [webserver]
    keyword: Caddy
