id: ds-store-exposed
info:
  name: .DS_Store File Exposed
  severity: low
  author: redmatrix
  tags: [exposure, ds_store, info, macos]
  reference:
    - https://en.wikipedia.org/wiki/.DS_Store
requests:
  - method: GET
    path: /.DS_Store
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      # .DS_Store 二进制 magic: "Bud1" 在 4..8 字节附近；本 MVP 用 word 简单子串
      - type: word
        part: body
        words:
          - "Bud1"
